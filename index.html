<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Arbóreo – Puerto Ayora – Santa Cruz</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
<h1><span class="icon">&#127795;</span> Inventario Arbóreo<span>– Puerto Ayora – Santa Cruz</span></h1>
<div class="header-status"><span class="dot loading"></span><span id="statusText">Iniciando...</span></div>
</header>
<div class="layout">
<aside class="sidebar">
<div class="sidebar-scroll">
<div><div class="section-title">Mapa base</div><div class="basemap-group" id="basemapGroup"></div></div>
<div><div class="section-title">Capas</div><div class="layer-list" id="layerList"></div></div>
<div><div class="section-title">Estadísticas</div>
<div class="info-grid">
<div class="info-row"><span class="label">Capas activas</span><span class="value" id="activeCount">0</span></div>
<div class="info-row"><span class="label">Elementos visibles</span><span class="value" id="totalFeatures">0</span></div>
</div></div>
<div><div class="section-title">Participa</div>
<a href="encuesta.html" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600;transition:opacity .2s">
<i class="fas fa-clipboard-list"></i> Encuesta ciudadana
<span style="margin-left:auto;font-size:.75rem;opacity:.8">Árboles y áreas verdes</span></a>
<button onclick="generarPDF()" style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:linear-gradient(135deg,#c62828,#d32f2f);color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .2s;width:100%;margin-top:6px">
<i class="fas fa-file-pdf"></i> Generar PDF encuestas
<span style="margin-left:auto;font-size:.75rem;opacity:.8">Reporte</span></button></div>
<div style="margin-top:auto;padding-top:16px;text-align:center;font-size:0.72rem;color:var(--text-secondary);border-top:1px solid var(--border)">
UTPL 2026 &middot; Especialidad SIG &middot; Mapa: OpenStreetMap / Esri</div>
</div>
</aside>
<main class="map-area"><div id="map"></div></main>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="script.js"></script>
</body>
</html>
